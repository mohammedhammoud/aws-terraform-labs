name: Terraform CI

on:
  push:
  pull_request:

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform fmt -check -recursive

  discover:
    runs-on: ubuntu-latest
    outputs:
      terraform_dirs: ${{ steps.discover.outputs.terraform_dirs }}
    steps:
      - uses: actions/checkout@v4
      - id: discover
        run: |
          terraform_dirs=$(find labs -mindepth 2 -maxdepth 2 -type d -name terraform | sort | jq -R -s -c 'split("\n")[:-1]')
          echo "terraform_dirs=$terraform_dirs" >> "$GITHUB_OUTPUT"

  validate:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        terraform_dir: ${{ fromJson(needs.discover.outputs.terraform_dirs) }}
    env:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      AWS_EC2_METADATA_DISABLED: true
    defaults:
      run:
        working-directory: ${{ matrix.terraform_dir }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform init -backend=false
      - run: terraform validate
